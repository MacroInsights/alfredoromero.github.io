<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}/assets/images/headshot.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ site.url }}/assets/images/headshot.jpg">

  <!-- Favicon -->
  <link rel="icon" href="{{ site.baseurl }}/favicon.svg" type="image/svg+xml">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav" id="site-nav">
    <div class="nav-inner">
      <a href="{{ site.baseurl }}/" class="nav-logo">Alfredo A. Romero</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="{{ site.baseurl }}/#aei">Aggie Economic Index</a></li>
        <li><a href="{{ site.baseurl }}/#media">Media</a></li>
        <li><a href="{{ site.baseurl }}/#research">Research</a></li>
        <li><a href="{{ site.baseurl }}/#musings">Data Musings</a></li>
        <li><a href="{{ site.baseurl }}/#contact" class="nav-cta">Book a Talk</a></li>
      </ul>
    </div>
  </nav>

  <!-- CONTENT -->
  {{ content }}

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p class="footer-name">Alfredo A. Romero, Ph.D.</p>
      <p class="footer-sub">Chair &amp; Associate Professor of Economics · NC A&amp;T State University</p>
      <p class="footer-copy">&copy; 2026 Alfredo A. Romero. All rights reserved.</p>
    </div>
  </footer>

  <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
